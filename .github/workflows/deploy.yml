name: backend image release

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'pipeline/**'
      - 'api/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
    types: [closed]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/alenkoikkara/asset-dashboard-backend:latest

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Setup SSH Key and Config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host sshpi
            User charlie
            HostName sshpi.alenkoikkara.com
            IdentityFile ~/.ssh/id_rsa
            ProxyCommand cloudflared access tcp --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Deploy to Pi
        run: |
          ssh sshpi <<'EOF'
            cd ~
            docker compose pull asset-dashboard-api
            docker compose up -d --no-deps --force-recreate asset-dashboard-api
            echo "API restarted with updated image."
          EOF
