services:
  pipeline:
    image: ghcr.io/${GITHUB_USERNAME}/asset-dashboard-backend:latest
    env_file: .env
    volumes:
      - asset_dashboard_data:/app/data
    restart: "no"   # one-shot job — cron triggers it, it exits when done

volumes:
  # Named volume so the UI container (in the main compose) can mount the same data
  asset_dashboard_data:
    name: asset_dashboard_data
